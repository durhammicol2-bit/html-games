<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultCord Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #36393f;
            color: #dcddde;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* GUILD/SERVER SIDEBAR */
        .guild-bar {
            width: 72px;
            background: #202225;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            border-right: 1px solid #000;
            overflow-y: auto;
            scrollbar-width: none;
            position: relative;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .guild-bar::-webkit-scrollbar {
            display: none;
        }

        .guild-item {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #36393f;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            font-weight: 600;
            color: #dcddde;
            position: relative;
            border: 2px solid transparent;
        }

        .guild-item:hover {
            background: #667eea;
            border-radius: 25%;
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .guild-item.active {
            background: #667eea;
            border-radius: 25%;
            border-color: #fff;
            box-shadow: 0 0 0 2px #202225, 0 0 0 4px #667eea;
        }

        .guild-item.home {
            background: linear-gradient(135deg, #7289da, #667eea);
            position: relative;
        }

        .guild-item.home:hover {
            background: linear-gradient(135deg, #5a6eb8, #5568d3);
        }

        .guild-item.home.active {
            background: linear-gradient(135deg, #667eea, #5568d3);
        }

        /* Discord-like Guild Separator */
        .guild-separator {
            width: 32px;
            height: 2px;
            background: #72867d !important;
            margin: 8px 20px;
            border-radius: 4px;
            opacity: 1 !important;
            display: block !important;
            visibility: visible !important;
        }

        .guild-add {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #2f3136;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #43b581;
            font-size: 24px;
            font-weight: 300;
            border: 2px solid transparent;
        }

        .guild-add:hover {
            background: #43b581;
            color: #fff;
            border-radius: 25%;
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(67, 181, 129, 0.4);
        }

        /* Server tooltips */
        .guild-item[data-tooltip]:hover::after,
        .guild-add[data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 60px;
            top: 50%;
            transform: translateY(-50%);
            background: #18191c;
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            animation: tooltipFadeIn 0.2s ease forwards;
        }

        @keyframes tooltipFadeIn {
            to {
                opacity: 1;
            }
        }

        /* AUTH PAGES */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .auth-box {
            background: #2f3136;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .auth-box h2 {
            margin-bottom: 30px;
            text-align: center;
            font-size: 24px;
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #202225;
            border-radius: 5px;
            background: #40444b;
            color: #dcddde;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: #36393f;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: #fff;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .auth-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .auth-link a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
        }

        .auth-link a:hover {
            text-decoration: underline;
        }

        .error {
            color: #f04747;
            font-size: 12px;
            margin-top: 5px;
        }

        .success {
            color: #43b581;
            font-size: 12px;
            margin-top: 5px;
        }

        /* CHAT INTERFACE */
        .chat-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        .chat-layout {
            display: flex;
            flex: 1;
        }

        .sidebar {
            width: 240px;
            background: #2f3136;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #202225;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #202225;
            font-weight: 600;
            font-size: 16px;
        }

        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .channel-item {
            padding: 8px 16px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: space-between;
        }

        .channel-name {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .channel-delete {
            background: none;
            border: none;
            color: #72767d;
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            display: none;
        }

        .channel-item:hover .channel-delete {
            display: block;
            color: #f04747;
        }

        .user-panel {
            padding: 16px 16px 16px 0;
            background: #292b2f;
            border-top: 1px solid #202225;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            margin-left: -72px;
            padding-left: 16px;
            position: relative;
            z-index: 15;
        }

        .profile-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #fff;
        }

        .user-info {
            flex: 1;
        }

        .username {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-meta {
            margin-top: 4px;
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .user-meta span {
            font-size: 11px;
            color: #fff;
        }

        .status {
            font-size: 12px;
            color: #72767d;
        }

        .status.online {
            color: #43b581;
            font-weight: 600;
        }

        .status.offline {
            color: #f04747;
            font-weight: 600;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #72767d;
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }

        .logout-btn:hover {
            color: #dcddde;
        }

        /* MAIN CHAT AREA */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #36393f;
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid #202225;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: #fff;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-author {
            font-weight: 600;
            font-size: 14px;
        }

        .message-time {
            font-size: 12px;
            color: #72767d;
        }

        .message-text {
            color: #dcddde;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .input-area {
            padding: 16px;
            border-top: 1px solid #202225;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            background: #40444b;
            border: 1px solid #202225;
            border-radius: 20px;
            padding: 12px 16px;
            color: #dcddde;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
        }

        .message-input:focus {
            outline: none;
            border-color: #667eea;
            background: #36393f;
        }

        .send-btn {
            background: #667eea;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #5568d3;
        }

        .hidden {
            display: none !important;
        }

        /* PROFILE MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #36393f;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            padding: 24px;
        }

        .modal-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #72767d;
            font-size: 24px;
            cursor: pointer;
        }

        .close-btn:hover {
            color: #dcddde;
        }

        .profile-display {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-avatar-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 32px;
            color: #fff;
            margin: 0 auto 16px;
        }

        .profile-username {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .profile-email {
            font-size: 14px;
            color: #72767d;
        }

        /* MEMBER LIST */
        .member-list {
            width: 240px;
            background: #2f3136;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #202225;
            overflow: hidden;
        }

        .member-list-header {
            padding: 16px;
            border-bottom: 1px solid #202225;
            font-weight: 600;
            font-size: 14px;
            color: #72767d;
        }

        .member-list-items {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .member-item {
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .member-item:hover {
            background: #36393f;
        }

        .member-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #fff;
            flex-shrink: 0;
        }

        .member-name {
            flex: 1;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .member-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .member-status.online {
            background: #43b581;
        }

        .member-status.offline {
            background: #f04747; /* red for offline */
            box-shadow: 0 0 6px rgba(240,71,71,0.15);
        }

        /* Member profile popup card */
        .member-card {
            position: absolute;
            background: #2f3136;
            color: #dcddde;
            border: 1px solid #202225;
            padding: 12px;
            border-radius: 8px;
            width: 240px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            z-index: 1200;
            display: none;
        }

        .member-card.active { display: block; }

        .member-card .mc-header { display:flex; gap:10px; align-items:center; margin-bottom:8px; }
        .member-card .mc-avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; }
        .member-card .mc-row { font-size:13px; color:#bfbfbf; margin-bottom:6px; }

        @media (max-width: 768px) {
            .guild-bar {
                width: 60px;
            }
            
            .guild-item, .guild-add {
                width: 40px;
                height: 40px;
                font-size: 14px;
            }

            .sidebar, .member-list {
                width: 200px;
            }

            .sidebar-header, .member-list-header {
                font-size: 13px;
                padding: 12px;
            }
        }

        @media (max-width: 600px) {
            .member-list {
                display: none;
            }

            .sidebar {
                width: 180px;
            }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4"></script>
</head>
<body>
    <!-- LOGIN PAGE -->
    <div id="loginPage" class="auth-container">
        <div class="auth-box">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" required>
                    <div id="loginEmailError" class="error"></div>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required>
                    <div id="loginPasswordError" class="error"></div>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <div id="loginError" class="error"></div>
            </form>
            <div class="auth-link">
                Don't have an account? <a onclick="showSignup()">Sign up</a>
            </div>
        </div>
    </div>

    <!-- SIGNUP PAGE -->
    <div id="signupPage" class="auth-container hidden">
        <div class="auth-box">
            <h2>Create Account</h2>
            <form id="signupForm">
                <div class="form-group">
                    <label for="signupUsername">Username</label>
                    <input type="text" id="signupUsername" required>
                    <div id="signupUsernameError" class="error"></div>
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" required>
                    <div id="signupEmailError" class="error"></div>
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" required>
                    <div id="signupPasswordError" class="error"></div>
                </div>
                <div class="form-group">
                    <label for="signupPasswordConfirm">Confirm Password</label>
                    <input type="password" id="signupPasswordConfirm" required>
                    <div id="signupPasswordConfirmError" class="error"></div>
                </div>
                <button type="submit" class="btn btn-primary">Sign Up</button>
                <div id="signupError" class="error"></div>
            </form>
            <div class="auth-link">
                Already have an account? <a onclick="showLogin()">Login</a>
            </div>
        </div>
    </div>

    <!-- CHAT PAGE -->
    <div id="chatPage" class="hidden">
        <div class="chat-container">
            <!-- GUILD/SERVER LIST -->
            <div class="guild-bar">
                <div class="guild-item home active" data-tooltip="Direct Messages" title="Direct Messages">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/>
                    </svg>
                </div>
                <div class="guild-separator"></div>
                <div class="guild-item" style="background: #5865F2;" data-tooltip="VaultCord" title="VaultCord">
                    V
                </div>
                <div class="guild-item" style="background: #57F287;" data-tooltip="Gaming Hub" title="Gaming Hub">
                    G
                </div>
                <div class="guild-item" style="background: #ED4245;" data-tooltip="Coding Zone" title="Coding Zone">
                    C
                </div>
                <div class="guild-item" style="background: #FEE75C; color: #2f3136;" data-tooltip="Art & Design" title="Art & Design">
                    A
                </div>
                <div class="guild-separator"></div>
                <div class="guild-add" data-tooltip="Add Server" title="Add Server">
                    +
                </div>
            </div>
            
            <div class="chat-layout">
                <!-- SIDEBAR -->
                <div class="sidebar">
                    <div class="sidebar-header" id="serverName">VaultCord</div>
                    <div class="channels-list" id="channelsList">
                        <div style="padding: 8px 16px; color: #72767d; font-size: 12px;">Loading channels...</div>
                    </div>
                    <div class="user-panel" onclick="showProfile()">
                        <div class="profile-avatar" id="userAvatarSmall"></div>
                        <div class="user-info">
                            <div style="display:flex;align-items:center;gap:6px;">
                                <div class="username" id="usernameSidebar"></div>
                                <div id="sidebarAdmin"></div>
                            </div>
                            <div class="user-meta"><span id="sidebarTag"></span></div>
                            <div class="status" id="sidebarStatus">Online</div>
                        </div>
                        <button class="logout-btn" onclick="openUserSettings(event)">⚙️</button>
                    </div>
                </div>

                <!-- MAIN CONTENT -->
                <div class="main-content">
                    <div class="chat-header">
                        <h3 id="channelName"># general</h3>
                    </div>

                    <div class="messages-area" id="messagesArea">
                        <div class="empty-state">
                            <p>No messages yet. Start the conversation!</p>
                        </div>
                    </div>

                    <div class="input-area">
                        <div class="input-wrapper">
                            <textarea class="message-input" id="messageInput" placeholder="Type a message..." rows="1"></textarea>
                            <button class="send-btn" onclick="sendMessage()">Send</button>
                        </div>
                    </div>
                </div>

                <!-- MEMBER LIST -->
                <div class="member-list">
                    <div class="member-list-header">Members</div>
                    <div class="member-list-items" id="memberList">
                        <div style="padding: 16px; color: #72767d; font-size: 12px;">Loading members...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CREATE CHANNEL MODAL -->
    <div id="createChannelModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create Channel</h2>
                <button class="close-btn" onclick="closeCreateChannelModal()">&times;</button>
            </div>
            <form id="createChannelForm">
                <div class="form-group">
                    <label for="channelName">Channel Name</label>
                    <input type="text" id="channelName" placeholder="e.g. announcements" required>
                    <div id="channelError" class="error"></div>
                </div>
                <div class="form-group">
                    <label for="channelDesc">Description (optional)</label>
                    <input type="text" id="channelDesc" placeholder="What's this channel about?">
                </div>
                <button type="submit" class="btn btn-primary">Create</button>
            </form>
        </div>
    </div>

    <!-- PROFILE MODAL -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>User Profile</h2>
                <button class="close-btn" onclick="closeProfile()">&times;</button>
            </div>
            <div class="profile-display">
                <div class="profile-avatar-large" id="profileAvatarLarge"></div>
                <div class="profile-username" id="profileUsername" style="display: flex; align-items: center; justify-content: center; gap: 8px;"></div>
                <div class="profile-email" id="profileEmail"></div>
                <div id="adminBadge" style="margin-top: 10px;"></div>
                <div id="userTag" style="margin-top: 8px;"></div>
            </div>
            <button class="btn btn-primary" onclick="logout()">Logout</button>
            <button id="devPanelBtn" class="btn" style="background: #764ba2; margin-top: 10px; display: none;" onclick="window.open('/dev-panel.html', '_blank')">Dev Panel</button>
        </div>
    </div>

    <!-- USER SETTINGS MODAL -->
    <div id="userSettingsModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h2>User Settings</h2>
                <button class="close-btn" onclick="closeUserSettings()">&times;</button>
            </div>
            
            <!-- Profile Section -->
            <div class="settings-section">
                <h3>Profile Information</h3>
                <div class="profile-display">
                    <div class="profile-avatar-large" id="settingsAvatarLarge"></div>
                    <div class="profile-username" id="settingsUsername" style="display: flex; align-items: center; justify-content: center; gap: 8px;"></div>
                    <div class="profile-email" id="settingsEmail"></div>
                    <div id="settingsAdminBadge" style="margin-top: 10px;"></div>
                    <div id="settingsUserTag" style="margin-top: 8px;"></div>
                </div>
            </div>

        // Render all messages at once using bulk-fetched tags/roles for performance

                ]);

                const tagMap = new Map((tagsRes.data || []).map(t => [t.user_id, t]));

                // fallback to appending sequentially

        function markUserOnline(email) {
            // Mark user as online with current timestamp and start heartbeat
            const userData = JSON.parse(sessionStorage.getItem('onlineUsers') || '{}');
            userData[email] = {
                online: true,
                lastSeen: Date.now(),
                isAdmin: userRole === 'admin',
                userId: currentUser?.id
            };
            sessionStorage.setItem('onlineUsers', JSON.stringify(userData));
            onlineUsers.set(email, { online: true, isAdmin: userRole === 'admin', userId: currentUser?.id });

            // Start a heartbeat to keep current user marked as online
            if (currentUser && !window.memberHeartbeatInterval) {
                window.memberHeartbeatInterval = setInterval(() => {
                    try {
                        const ud = JSON.parse(sessionStorage.getItem('onlineUsers') || '{}');
                        ud[email] = ud[email] || {};
                        ud[email].lastSeen = Date.now();
                        ud[email].isAdmin = userRole === 'admin';
                        ud[email].userId = currentUser?.id;
                        sessionStorage.setItem('onlineUsers', JSON.stringify(ud));
                        onlineUsers.set(email, { online: true, isAdmin: userRole === 'admin', userId: currentUser?.id });
                    } catch (e) {
                        console.error('Heartbeat error:', e);
                    }
                }, 15000); // update every 15s

                // On unload remove the current user's entry so others see them offline
                window.addEventListener('beforeunload', () => {
                    try {
                        const ud = JSON.parse(sessionStorage.getItem('onlineUsers') || '{}');
                        delete ud[email];
                        sessionStorage.setItem('onlineUsers', JSON.stringify(ud));
                    } catch (e) {}
                });
            }
        }

        function getOnlineUsers() {
            const userData = JSON.parse(sessionStorage.getItem('onlineUsers') || '{}');
            const now = Date.now();
            const onlineList = [];
            
            // Consider users online if seen in the last 5 minutes
            Object.keys(userData).forEach(email => {
                if (now - userData[email].lastSeen < 5 * 60 * 1000) {
                    onlineList.push(email);
                }
            });
            return onlineList;
        }

        async function updateMemberList() {
            const memberListEl = document.getElementById('memberList');
            try {
                // Load all profiles so we show everyone (online or offline)
                const { data: profiles } = await supabase.from('profiles').select('id, username');

                if (!profiles || profiles.length === 0) {
                    memberListEl.innerHTML = '<div style="padding: 16px; color: #72767d; font-size: 12px;">No users found</div>';
                    return;
                }

                // Fetch tags and roles in bulk to avoid per-user queries
                const [{ data: allTags }, { data: allRoles }] = await Promise.all([
                    supabase.from('user_tags').select('*'),
                    supabase.from('user_roles').select('user_id, role')
                ]);

                const tagMap = new Map();
                allTags?.forEach(tag => tagMap.set(tag.user_id, tag));

                const roleMap = new Map();
                allRoles?.forEach(r => roleMap.set(r.user_id, r.role));

                // Build a map from userId -> session info from sessionStorage
                const stored = JSON.parse(sessionStorage.getItem('onlineUsers') || '{}');
                const userIdToSession = new Map();
                Object.keys(stored).forEach(email => {
                    const entry = stored[email];
                    if (entry && entry.userId) userIdToSession.set(entry.userId, { email, lastSeen: entry.lastSeen, isAdmin: entry.isAdmin });
                });

                const now = Date.now();
                const onlineThreshold = 2 * 60 * 1000; // 2 minutes

                const html = profiles.map(profile => {
                    const pid = profile.id;
                    const username = profile.username || profile.id;
                    const avatar = generateAvatar(username);
                    const session = userIdToSession.get(pid);
                    const isOnline = session && (now - session.lastSeen < onlineThreshold);
                    const statusClass = isOnline ? 'online' : 'offline';
                    const role = roleMap.get(pid) || 'user';
                    const isAdmin = role === 'admin';
                    const adminHTML = isAdmin ? ' <span style="color: #f04747; font-weight: 600;">👑</span>' : '';
                    const tag = tagMap.get(pid);
                    let tagHTML = '';
                    if (tag) {
                        const tagColor = `rgb(${tag.tag_color_r}, ${tag.tag_color_g}, ${tag.tag_color_b})`;
                        tagHTML = `<span style="background: ${tagColor}; color: white; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; margin-left: 6px;">${escapeHtml(tag.tag_text)}</span>`;
                    }
                    const you = (currentUser && currentUser.id === pid) ? ' <span style="color: #72767d; font-size: 12px;">(you)</span>' : '';

                    return `
                        <div class="member-item" title="${session?.email || 'Unknown'}" data-user-id="${pid}" onclick="showMemberCard(event, '${pid}')">
                            <div class="member-avatar" style="background-color: ${avatar.color}">${avatar.letter}</div>
                            <div class="member-name">
                                ${escapeHtml(username)}
                                ${adminHTML}
                                ${tagHTML}
                                ${you}
                            </div>
                            <div class="member-status ${statusClass}" title="${isOnline ? 'Online' : 'Offline'}"></div>
                        </div>
                    `;
                }).join('');

                memberListEl.innerHTML = html;
            } catch (error) {
                console.error('Error updating member list:', error);
                memberListEl.innerHTML = '<div style="padding: 16px; color: #72767d; font-size: 12px;">Unable to load members</div>';
            }
        }
        function generateAvatar(username) {
            const letter = (username || 'U')[0].toUpperCase();
            const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a', '#feca57', '#ff9ff3', '#56ab2f', '#ff6b6b'];
            let hash = 0;
            for (let i = 0; i < username.length; i++) {
                hash = username.charCodeAt(i) + ((hash << 5) - hash);
            }
            const color = colors[Math.abs(hash) % colors.length];
            return { letter, color };
        }

        function getRandomColor() {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a', '#feca57', '#ff9ff3', '#56ab2f', '#ff6b6b'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;

        // Show a small member profile card next to the clicked member
        async function showMemberCard(event, userId) {
            event.stopPropagation();
            const card = document.getElementById('memberCard');
            if (!card) return;

            try {
                const [{ data: profile }, { data: roleRes }, { data: tagRes }] = await Promise.all([
                    supabase.from('profiles').select('id, username, email').eq('id', userId).maybeSingle(),
                    supabase.from('user_roles').select('role').eq('user_id', userId).maybeSingle(),
                    supabase.from('user_tags').select('*').eq('user_id', userId).maybeSingle()
                ]);

                const username = profile?.username || userId;
                const role = roleRes?.role || 'user';
                const roleHTML = role === 'admin' ? '<div class="mc-row"><strong>Role:</strong> <span style="color:#f04747;">👑 Admin</span></div>' : '';
                const tagHTML = tagRes ? `<div class="mc-row"><strong>Tag:</strong> <span style="background:rgb(${tagRes.tag_color_r},${tagRes.tag_color_g},${tagRes.tag_color_b});color:white;padding:2px 6px;border-radius:3px;font-size:11px;">${escapeHtml(tagRes.tag_text)}</span></div>` : '';

                // Use profile email directly if available, otherwise use sessionStorage lookup
                let email = profile?.email || 'Unknown';
                let status = 'Offline';
                
                // Only use sessionStorage lookup if profile doesn't have email
                if (!profile?.email) {
                    const stored = JSON.parse(sessionStorage.getItem('onlineUsers') || '{}');
                    Object.keys(stored).forEach(e => {
                        const entry = stored[e];
                        if (entry && entry.userId === userId) {
                            email = e;
                            status = (Date.now() - entry.lastSeen < 2 * 60 * 1000) ? 'Online' : 'Offline';
                        }
                    });
                }

                const avatar = generateAvatar(username);

                card.innerHTML = `
                    <div class="mc-header">
                        <div class="mc-avatar" style="background:${avatar.color};color:white;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:16px;flex-shrink:0;">
                            ${avatar.letter}
                        </div>
                        <div class="mc-info">
                            <div class="mc-username">${escapeHtml(username)}</div>
                            <div class="mc-email">${escapeHtml(email)}</div>
                        </div>
                    </div>
                    <div class="mc-row"><strong>Status:</strong> ${status}</div>
                    ${roleHTML}
                    ${tagHTML}
                    <div style="text-align:right; margin-top:8px;"><button class="btn" style="padding:6px 8px; background:#40444b; border:none; color:#fff; border-radius:4px;" onclick="hideMemberCard()">Close</button></div>
                `;

                // position card near clicked element - use event.target instead of event.currentTarget
                const clickedElement = event.target || event.srcElement;
                const memberItem = clickedElement.closest('.member-item');
                if (memberItem) {
                    const rect = memberItem.getBoundingClientRect();
                    const top = rect.top + window.scrollY;
                    let left = rect.left - 250; // 250px is card width + some padding
                    
                    // adjust if card would go off screen
                    const cardWidth = 250;
                    if (left < 10) left = 10;
                    if (left + cardWidth > window.innerWidth - 10) left = window.innerWidth - cardWidth - 10;
                    
                    card.style.top = top + 'px';
                    card.style.left = left + 'px';
                    card.style.display = 'block';
                    card.style.position = 'absolute';
                    card.style.zIndex = '1000';
                } else {
                    // fallback: center the card
                    card.style.top = '50%';
                    card.style.left = '50%';
                    card.style.transform = 'translate(-50%, -50%)';
                    card.style.display = 'block';
                    card.style.position = 'fixed';
                    card.style.zIndex = '1000';
                }
            } catch (err) {
                console.error('Error showing member card:', err);
            }
        }

        async function openUserSettings(event) {
            if (event) event.stopPropagation();

            const avatar = generateAvatar(currentUser.profile?.username || currentUser.email);
            document.getElementById('settingsAvatarLarge').textContent = avatar.letter;
            document.getElementById('settingsAvatarLarge').style.backgroundColor = avatar.color;
            document.getElementById('settingsUsername').textContent = currentUser.profile?.username || 'User';
            document.getElementById('settingsEmail').textContent = currentUser.email;
            
            // Update admin badge
            const settingsAdminBadge = document.getElementById('settingsAdminBadge');
            if (userRole === 'admin') {
                settingsAdminBadge.innerHTML = '<span style="background: #f04747; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600;">👑 ADMIN</span>';
            } else {
                settingsAdminBadge.innerHTML = '';
            }
            
            // Update user tag
            try {
                const { data: userTag } = await supabase
                    .from('user_tags')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .single();

                const settingsUserTag = document.getElementById('settingsUserTag');
                if (userTag && settingsUserTag) {
                    const tagColor = `rgb(${userTag.tag_color_r}, ${userTag.tag_color_g}, ${userTag.tag_color_b})`;
                    settingsUserTag.innerHTML = `<span style="background: ${tagColor}; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600;">${escapeHtml(userTag.tag_text)}</span>`;
                } else if (settingsUserTag) {
                    settingsUserTag.innerHTML = '';
                }
            } catch (error) {
                console.log('No tag found for user');
            }
            
            // Load saved settings
            loadUserSettings();
            
            // Show modal
            document.getElementById('userSettingsModal').classList.add('active');
        }

function loadUserSettings() {
    // Load settings from localStorage
    const savedSettings = JSON.parse(localStorage.getItem('userSettings') || '{}');
    
    document.getElementById('settingsDisplayName').value = savedSettings.displayName || '';
    document.getElementById('settingsDescription').value = savedSettings.description || '';
    document.getElementById('settingsStatusMessage').value = savedSettings.statusMessage || '';
    document.getElementById('settingsTheme').value = savedSettings.theme || 'dark';
    document.getElementById('settingsNotifications').checked = savedSettings.notifications !== false;
    
    // Apply theme immediately after loading settings
    applyTheme(savedSettings.theme || 'dark');
}

function saveUserSettings() {
    // Save settings to localStorage
    const settings = {
        displayName: document.getElementById('settingsDisplayName').value,
        description: document.getElementById('settingsDescription').value,
        statusMessage: document.getElementById('settingsStatusMessage').value,
        theme: document.getElementById('settingsTheme').value,
        notifications: document.getElementById('settingsNotifications').checked
    };
    
    localStorage.setItem('userSettings', JSON.stringify(settings));
    
    // Apply theme
    applyTheme(settings.theme);
    
    alert('Settings saved successfully!');
    closeUserSettings();
}
