<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: white;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .back-link {
            color: #667eea;
            text-decoration: none;
            margin-bottom: 20px;
            display: inline-block;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .comment-box {
            background: #2a2a2a;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 3px solid #667eea;
        }
        .comment-form {
            background: #2a2a2a;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            background: #1a1a1a;
            color: white;
            border: 1px solid #444;
            border-radius: 3px;
            box-sizing: border-box;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background: #5a6fd8;
        }
        .no-comments {
            text-align: center;
            color: #888;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Back to Games</a>
        
        <h2>Game Comments</h2>
        
        <div class="comment-form">
            <input type="text" id="name" placeholder="Name (optional)" maxlength="30">
            <textarea id="comment" placeholder="Write your comment..." rows="3" maxlength="200"></textarea>
            <button onclick="addComment()">Post Comment</button>
        </div>
        
        <div id="comments">
            <div class="no-comments">No comments yet. Be the first!</div>
        </div>
    </div>

    <script>
        // Simple, crash-proof comments system
        function addComment() {
            try {
                var name = document.getElementById('name').value || 'Anonymous';
                var comment = document.getElementById('comment').value.trim();
                
                if (!comment) {
                    alert('Please write a comment');
                    return;
                }
                
                // Get existing comments
                var comments = [];
                try {
                    var saved = localStorage.getItem('simpleComments');
                    if (saved) {
                        comments = JSON.parse(saved);
                    }
                } catch (e) {
                    // If localStorage fails, just continue
                }
                
                // Add new comment
                comments.push({
                    name: name,
                    text: comment,
                    time: new Date().toLocaleString()
                });
                
                // Keep only last 20 comments
                if (comments.length > 20) {
                    comments = comments.slice(-20);
                }
                
                // Save comments
                try {
                    localStorage.setItem('simpleComments', JSON.stringify(comments));
                } catch (e) {
                    // If localStorage fails, just continue
                }
                
                // Clear form
                document.getElementById('name').value = '';
                document.getElementById('comment').value = '';
                
                // Refresh display
                showComments();
                
            } catch (e) {
                alert('Error posting comment');
            }
        }
        
        function showComments() {
            try {
                var commentsDiv = document.getElementById('comments');
                var comments = [];
                
                try {
                    var saved = localStorage.getItem('simpleComments');
                    if (saved) {
                        comments = JSON.parse(saved);
                    }
                } catch (e) {
                    // If localStorage fails, show no comments
                }
                
                if (comments.length === 0) {
                    commentsDiv.innerHTML = '<div class="no-comments">No comments yet. Be the first!</div>';
                    return;
                }
                
                var html = '';
                for (var i = comments.length - 1; i >= 0; i--) {
                    var comment = comments[i];
                    html += '<div class="comment-box">';
                    html += '<strong>' + comment.name + '</strong> - ' + comment.time + '<br>';
                    html += comment.text;
                    html += '</div>';
                }
                
                commentsDiv.innerHTML = html;
                
            } catch (e) {
                document.getElementById('comments').innerHTML = '<div class="no-comments">Error loading comments</div>';
            }
        }
        
        // Load comments when page loads
        showComments();
        
        // Allow Enter key to submit (but not Shift+Enter)
        document.getElementById('comment').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                addComment();
            }
        });
    </script>
</body>
</html>
