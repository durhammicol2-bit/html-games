<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #fff;
    }

    .comments-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      height: 100vh;
      overflow-y: auto;
    }

    .comments-header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .comments-header h1 {
      margin: 0 0 10px 0;
      font-size: 2rem;
    }

    .comment-form {
      background: #2a2a2a;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .comment-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #444;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      margin-bottom: 10px;
      resize: vertical;
      min-height: 80px;
    }

    .comment-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
    }

    .name-input {
      width: 100%;
      padding: 10px;
      border: 2px solid #444;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .submit-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .comments-list {
      margin-top: 20px;
    }

    .comment {
      background: #2a2a2a;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .comment-author {
      font-weight: bold;
      color: #667eea;
      margin-bottom: 5px;
    }

    .comment-time {
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
    }

    .comment-text {
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .no-comments {
      text-align: center;
      color: #888;
      padding: 40px;
      font-style: italic;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(102, 126, 234, 0.9);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      font-size: 14px;
      z-index: 1000;
      transition: background 0.3s;
    }

    .back-btn:hover {
      background: rgba(102, 126, 234, 1);
    }
  </style>
</head>
<body>

  <a href="javascript:history.back()" class="back-btn">← Back to Games</a>

  <div class="comments-container">
    <div class="comments-header">
      <h1>💬 Game Comments</h1>
      <p>Share your thoughts and feedback!</p>
    </div>

    <div class="comment-form">
      <input type="text" class="name-input" id="nameInput" placeholder="Your name (optional)" maxlength="50">
      <textarea class="comment-input" id="commentInput" placeholder="Write your comment here..." maxlength="500"></textarea>
      <button class="submit-btn" onclick="addComment()">Post Comment</button>
    </div>

    <div class="comments-list" id="commentsList">
      <div class="no-comments">No comments yet. Be the first to comment!</div>
    </div>
  </div>

  <script>
    // Load comments from localStorage
    let comments = JSON.parse(localStorage.getItem('gameComments') || '[]');
    
    function displayComments() {
      const commentsList = document.getElementById('commentsList');
      
      if (comments.length === 0) {
        commentsList.innerHTML = '<div class="no-comments">No comments yet. Be the first to comment!</div>';
        return;
      }
      
      commentsList.innerHTML = comments
        .sort((a, b) => b.timestamp - a.timestamp)
        .map(comment => `
          <div class="comment">
            <div class="comment-author">${comment.name || 'Anonymous'}</div>
            <div class="comment-time">${new Date(comment.timestamp).toLocaleString()}</div>
            <div class="comment-text">${comment.text}</div>
          </div>
        `).join('');
    }
    
    function addComment() {
      const nameInput = document.getElementById('nameInput');
      const commentInput = document.getElementById('commentInput');
      
      const text = commentInput.value.trim();
      if (!text) {
        alert('Please write a comment before posting.');
        return;
      }
      
      const comment = {
        name: nameInput.value.trim() || 'Anonymous',
        text: text,
        timestamp: Date.now()
      };
      
      comments.push(comment);
      localStorage.setItem('gameComments', JSON.stringify(comments));
      
      // Clear form
      commentInput.value = '';
      nameInput.value = '';
      
      // Refresh display
      displayComments();
    }
    
    // Handle Enter key in comment textarea
    document.getElementById('commentInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        addComment();
      }
    });
    
    // Display comments on load
    displayComments();
  </script>

</body>
</html>
