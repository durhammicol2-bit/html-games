<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #000;
    }

    iframe {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .loading-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      text-align: center;
      background: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .loading-text {
      color: #333;
      font-size: 16px;
      margin: 0 0 5px 0;
      font-weight: 600;
    }
    
    .loading-warning {
      color: #666;
      font-size: 13px;
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="loading-container" id="loadingContainer">
    <div class="spinner"></div>
    <p class="loading-text">Loading comments...</p>
    <p class="loading-warning">⚠️ May be laggy on first load</p>
  </div>

  <iframe 
    src="https://padlet.com/embed/pwj8x8cqy4ohruh4" 
    frameborder="0" 
    allow="clipboard-write" 
    style="width:100%;height:100%;display:block;padding:0;margin:0"
    onload="hideLoading()"
    onerror="showError()">
  </iframe>

  <script>
    function hideLoading() {
      const loadingContainer = document.getElementById('loadingContainer');
      if (loadingContainer) {
        loadingContainer.style.display = 'none';
      }
    }
    
    function showError() {
      const loadingContainer = document.getElementById('loadingContainer');
      if (loadingContainer) {
        loadingContainer.innerHTML = `
          <div class="spinner" style="border-top: 5px solid #e74c3c;"></div>
          <p class="loading-text" style="color: #e74c3c;">Failed to load comments</p>
          <p class="loading-warning">Please refresh the page or try again later</p>
        `;
      }
    }
    
    // Fallback timeout - hide loading after 10 seconds even if iframe doesn't load
    setTimeout(() => {
      const loadingContainer = document.getElementById('loadingContainer');
      if (loadingContainer && loadingContainer.style.display !== 'none') {
        loadingContainer.innerHTML = `
          <p class="loading-text" style="color: #f39c12;">Loading is taking longer than expected</p>
          <p class="loading-warning">Comments may still be loading in the background</p>
        `;
      }
    }, 10000);
  </script>

</body>
</html>
